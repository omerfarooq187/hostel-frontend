<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="src/assets/ogoh_logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Officers Group of Hostels</title>
    <style>
      /* Splash screen styles - these load immediately */
      .initial-splash {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #0F0106 0%, #2a1a1a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: 'Plus Jakarta Sans', sans-serif;
        transition: opacity 0.6s ease-in-out;
      }

      .initial-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .splash-content {
        text-align: center;
        animation: fadeInUp 0.8s ease-out;
      }

      .splash-logo-container {
        width: 200px;  /* Increased from 140px */
        height: 200px; /* Increased from 140px */
        margin: 0 auto 2rem;
        position: relative;
        animation: float 3s ease-in-out infinite;
      }

      .splash-logo-ring {
        position: absolute;
        inset: 0;
        background: linear-gradient(to right, #F97316, #EA580C); /* Updated to orange */
        border-radius: 9999px;
        animation: spin 10s linear infinite;
      }

      .splash-logo-inner {
        position: absolute;
        inset: 8px; /* Slightly increased for better proportion */
        background: white;
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.3);
      }

      .splash-logo {
        width: 160px;  /* Increased from 85px */
        height: 160px; /* Increased from 85px */
        object-fit: contain;
        animation: pulse 2s ease-in-out infinite;
        /* Optimize image loading */
        content-visibility: auto;
        loading: eager;
      }

      .splash-title {
        color: white;
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        opacity: 0;
        animation: fadeInUp 0.6s ease-out 0.2s forwards;
        letter-spacing: -0.02em;
      }

      .splash-subtitle {
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(to right, #F97316, #EA580C); /* Updated to orange */
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        opacity: 0;
        animation: fadeInUp 0.6s ease-out 0.4s forwards;
        letter-spacing: -0.02em;
        margin-bottom: 2rem;
      }

      .splash-dots {
        margin-top: 2rem;
        display: flex;
        justify-content: center;
        gap: 0.75rem;
      }

      .splash-dot {
        width: 0.875rem;
        height: 0.875rem;
        background: #F97316; /* Updated to orange */
        border-radius: 9999px;
        animation: bounce 0.8s ease-in-out infinite;
      }

      .splash-dot:nth-child(2) {
        background: #EA580C; /* Darker orange */
        animation-delay: 0.15s;
      }

      .splash-dot:nth-child(3) {
        background: #FD8B3F; /* Lighter orange */
        animation-delay: 0.3s;
      }

      .splash-tagline {
        margin-top: 2rem;
        color: rgba(255, 255, 255, 0.8);
        font-size: 1rem;
        font-weight: 400;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.9; transform: scale(0.98); }
      }

      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      /* Make sure content is hidden until React loads */
      #root {
        opacity: 0;
        transition: opacity 0.3s ease-in;
      }

      #root.ready {
        opacity: 1;
      }

      /* Preload logo for faster loading */
      .preload-logo {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Preload logo images -->
    <link rel="preload" as="image" href="/src/assets/ogoh_logo.png">
    <link rel="preload" as="image" href="/src/assets/ogoh_logo.png" type="image/png">

    <!-- Splash Screen - Shows immediately -->
    <div id="splash-screen" class="initial-splash">
      <div class="splash-content">
        <div class="splash-logo-container">
          <div class="splash-logo-ring"></div>
          <div class="splash-logo-inner">
            <img 
              src="/src/assets/ogoh_logo.png" 
              alt="Officers Group of Hostels" 
              class="splash-logo"
              loading="eager"
              fetchpriority="high"
              decoding="sync"
            />
          </div>
        </div>
        <h1 class="splash-title">Officers Group of</h1>
        <h2 class="splash-subtitle">Hostels</h2>
        <div class="splash-dots">
          <div class="splash-dot"></div>
          <div class="splash-dot"></div>
          <div class="splash-dot"></div>
        </div>
        <div class="splash-tagline">Premium Accommodation for Officers & Students</div>
      </div>
    </div>

    <!-- React root - initially hidden -->
    <div id="root"></div>

<script>
  // Function to remove splash screen smoothly
  window.removeSplashScreen = function() {
    const splash = document.getElementById('splash-screen');
    const root = document.getElementById('root');
    
    if (splash) {
      splash.classList.add('fade-out');
      
      if (root) {
        root.classList.add('ready');
      }
      
      setTimeout(() => {
        splash.style.display = 'none';
      }, 600);
    }
  };

  // Listen for React to be ready
  window.addEventListener('load', function() {
    // Check if React has loaded
    if (document.getElementById('root')?.children.length > 0) {
      window.removeSplashScreen();
    }
  });

  // Fallback
  setTimeout(() => {
    window.removeSplashScreen();
  }, 2500);
</script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
